<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rangsor - Top Javítók | PadlizsanFanSub</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favico.png">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080810;
      --surface:  #0e0e1c;
      --card:     #13131f;
      --border:   rgba(255,255,255,.07);
      --accent:   #7c3aed;
      --gold:     #fbbf24;
      --silver:   #94a3b8;
      --bronze:   #fb923c;
      --text:     #e8e8f5;
      --muted:    #555570;
      --font:     'Syne', system-ui, sans-serif;
      --mono:     'DM Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      padding: 40px 28px 80px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── FEJLÉC ───────────────────────────────────────────── */
    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.03em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .trophy-icon {
      font-size: 3rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .page-header p {
      color: var(--muted);
      font-size: 1rem;
      font-family: var(--mono);
    }

    /* ── DOBOGÓ (TOP 3) ───────────────────────────────────── */
    .podium {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 20px;
      margin-bottom: 48px;
      padding: 0 20px;
    }

    .podium-place {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .podium-place.first {
      order: 2;
    }

    .podium-place.second {
      order: 1;
    }

    .podium-place.third {
      order: 3;
    }

    .podium-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid;
      margin-bottom: 12px;
      position: relative;
      z-index: 2;
    }

    .podium-place.first .podium-avatar {
      width: 120px;
      height: 120px;
      border-color: var(--gold);
      box-shadow: 0 8px 30px rgba(251,191,36,.4);
    }

    .podium-place.second .podium-avatar {
      border-color: var(--silver);
    }

    .podium-place.third .podium-avatar {
      border-color: var(--bronze);
    }

    .podium-medal {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 800;
      color: #000;
      z-index: 3;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
    }

    .podium-place.second .podium-medal {
      background: var(--silver);
    }

    .podium-place.third .podium-medal {
      background: var(--bronze);
    }

    .podium-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .podium-place.first .podium-name {
      font-size: 1.3rem;
    }

    .podium-stats {
      font-size: .82rem;
      color: var(--muted);
      font-family: var(--mono);
      text-align: center;
    }

    .podium-count {
      font-weight: 700;
      color: var(--gold);
    }

    .podium-place.second .podium-count {
      color: var(--silver);
    }

    .podium-place.third .podium-count {
      color: var(--bronze);
    }

    .podium-base {
      width: 140px;
      height: 120px;
      background: linear-gradient(135deg, rgba(251,191,36,.15), rgba(251,191,36,.05));
      border: 2px solid rgba(251,191,36,.3);
      border-radius: 12px 12px 0 0;
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--gold);
      font-family: var(--mono);
    }

    .podium-place.first .podium-base {
      height: 160px;
      width: 160px;
    }

    .podium-place.second .podium-base {
      background: linear-gradient(135deg, rgba(148,163,184,.15), rgba(148,163,184,.05));
      border-color: rgba(148,163,184,.3);
      color: var(--silver);
      height: 100px;
    }

    .podium-place.third .podium-base {
      background: linear-gradient(135deg, rgba(251,146,60,.15), rgba(251,146,60,.05));
      border-color: rgba(251,146,60,.3);
      color: var(--bronze);
      height: 80px;
    }

    /* ── RANGLISTA (4-10) ─────────────────────────────────── */
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .leaderboard-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all .2s;
      cursor: default;
    }

    .leaderboard-item:hover {
      border-color: rgba(124,58,237,.3);
      transform: translateX(4px);
    }

    .leaderboard-rank {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(124,58,237,.15);
      border: 1px solid rgba(124,58,237,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 800;
      color: var(--accent);
      font-family: var(--mono);
      flex-shrink: 0;
    }

    .leaderboard-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,.1);
      flex-shrink: 0;
    }

    .leaderboard-info {
      flex: 1;
      min-width: 0;
    }

    .leaderboard-name {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 3px;
    }

    .leaderboard-meta {
      font-size: .78rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .leaderboard-count {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
      font-family: var(--mono);
      flex-shrink: 0;
    }

    /* ── AVATAR PLACEHOLDER ───────────────────────────────── */
    .avatar-placeholder {
      background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #666;
    }

    /* ── ÜRES LISTA ───────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: .3;
    }

    .empty-state p {
      font-size: 1rem;
      line-height: 1.6;
    }

    /* ── LOADING ──────────────────────────────────────────── */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: .9rem;
    }

    .loading-spinner {
      font-size: 2rem;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      main {
        padding: 24px 14px 80px;
      }

      .page-header {
        margin-bottom: 28px;
      }

      .page-header h1 {
        font-size: 1.6rem;
        gap: 8px;
      }

      .trophy-icon {
        font-size: 2rem;
      }

      .podium {
        gap: 10px;
        padding: 0 4px;
        margin-bottom: 28px;
      }

      .podium-avatar {
        width: 64px;
        height: 64px;
      }

      .podium-place.first .podium-avatar {
        width: 76px;
        height: 76px;
      }

      .podium-base {
        width: 88px;
        height: 70px;
        font-size: 1.6rem;
        border-radius: 8px 8px 0 0;
      }

      .podium-place.first .podium-base {
        width: 100px;
        height: 90px;
      }

      .podium-place.second .podium-base {
        height: 60px;
      }

      .podium-place.third .podium-base {
        height: 48px;
      }

      .podium-medal {
        width: 24px;
        height: 24px;
        font-size: .85rem;
        top: -5px;
        right: -5px;
      }

      .podium-name {
        font-size: .8rem;
      }

      .podium-place.first .podium-name {
        font-size: .9rem;
      }

      .podium-stats {
        font-size: .7rem;
      }

      .leaderboard-item {
        padding: 12px 14px;
        gap: 10px;
      }

      .leaderboard-avatar {
        width: 36px;
        height: 36px;
      }

      .leaderboard-rank {
        width: 28px;
        height: 28px;
        font-size: .85rem;
      }

      .leaderboard-count {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
<div id="header-root"></div>
<div id="sidebar-root"></div>

<main>
  <div class="page-header">
    <h1>
      <span class="trophy-icon">🏆</span>
      Top Javítók
    </h1>
    <p>A legjobb képjavítók ranglistája</p>
  </div>

  <div id="podiumContainer">
    <!-- Dobogó ide kerül (TOP 3) -->
  </div>

  <div id="leaderboardList" class="leaderboard-list">
    <!-- 4-10. helyezettek ide kerülnek -->
  </div>

  <div id="loadingState" class="loading">
    <div class="loading-spinner">⏳</div><br>
    Rangsor betöltése...
  </div>

  <div id="emptyState" class="empty-state" style="display:none">
    <div class="empty-state-icon">📭</div>
    <p>
      Még nincs elfogadott javítás.<br>
      Légy te az első aki pontot szerez!
    </p>
  </div>
</main>

<script src="/js/leaderboard-init.js"></script>
<script type="module" src="/js/layout-loader.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/auth-check.js"></script>
<div id="footer"></div>
<script src="/js/footer.js"></script>
</body>
</html>
