<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PadlizsánFanSub - Profilom</title>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favico.png">
<link rel="stylesheet" href="/css/sidebar.css?v=20260119">
<link rel="stylesheet" href="/css/search.css?v=20260619">
<link rel="stylesheet" href="/css/grid.css?v=20260119">
<link rel="stylesheet" href="/css/header.css?v=20260619">
<link rel="stylesheet" href="/css/profile.css?v=20260619">
<link rel="stylesheet" href="/css/footer.css?v=20260405">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs/dist/cropper.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

</head>
<body>
<div id="header-root"></div>
<div id="sidebar-root"></div>

<main class="content">
<h1>My Profile</h1>
<div class="avatar-container">
  <img id="avatar" src="/uploads/default.png" />
  <div class="avatar-edit" onclick="openUpload()">✏️</div>
</div>
<input type="file" id="fileInput" hidden />
<div id="modal" style="display:none;">
  <div class="modal-content">
    <!-- JOBB FELÜL X GOMB -->
    <div class="modal-close" onclick="closeModal()">×</div>
    <div class="editor-layout">
      
      <!-- BAL: crop -->
      <div class="crop-container">
        <img id="preview" />
      </div>

      <!-- JOBB: live preview -->
      <div class="preview-side">
        <div class="preview-circle">
          <img id="preview-small" />
        </div>
        <p>Előnézet</p>
      </div>

    </div>

    <!-- ZOOM -->
    <input type="range" id="zoomSlider" min="0" max="3" step="0.01" value="1">

    <button onclick="saveAvatar()">Mentés</button>
  </div>
</div>
<script src="/js/profile-init.js?v=20260619"></script>
<div id="footer"></div>
<script src="/js/footer.js?v=20260619"></script>

<script type="module" src="/js/layout-loader.js?v=20260619"></script>
<script src="/js/sidebar.js?v=20260204"></script>
<script src="/js/auth-check.js?v=20260323"></script>
<script type="module" src="/js/avatar.js?v=20260323"></script>

</body>
</html>
