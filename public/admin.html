<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>PadlizsanFanSub – Admin</title>
<link rel="stylesheet" href="/css/sidebar.css">
<link rel="stylesheet" href="/css/admin.css">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/footer.css">
<link rel="stylesheet" href="/css/users.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="hidden">

<div id="header-root"></div>
<div id="sidebar-root"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  try {
    const res = await fetch("/api/auth/me");
    if (!res.ok) { location.replace("/index.html"); return; }
    const user = await res.json();
    if (user.role !== "admin") { location.replace("/index.html"); return; }
    document.body.classList.remove("hidden");
    initTabs();
    loadUsers();
    loadAnnouncements();
  } catch {
    location.replace("/index.html");
  }
});

/* ===== TABS ===== */
function initTabs() {
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.tab).classList.add("active");
    });
  });
}

/* ===== FELHASZNÁLÓK ===== */
async function loadUsers() {
  const res = await fetch("/api/admin/users");
  const users = await res.json();
  const tbody = document.getElementById("usersTableBody");
  tbody.innerHTML = "";
  users.forEach(u => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${u.id}</td>
      <td>${u.username}</td>
      <td>${u.email}</td>
      <td>${u.role}</td>
      <td>${u.active ? "✅" : "—"}</td>
      <td>${u.tier || "—"}</td>
      <td>${new Date(u.created_at).toLocaleDateString("hu-HU")}</td>
    `;
    tbody.appendChild(tr);
  });
}

/* ===== KIÍRÁSOK ===== */
async function loadAnnouncements() {
  const res = await fetch("/api/announcements");
  const items = await res.json();
  const list = document.getElementById("annList");
  list.innerHTML = "";

  if (!items.length) {
    list.innerHTML = "<p style='color:#aaa'>Nincs aktív kiírás.</p>";
    return;
  }

  items.forEach(a => {
    const div = document.createElement("div");
    div.className = "ann-item";
    div.innerHTML = `
      <div class="ann-item-info">
        <h3>${a.title}</h3>
        <p>${a.body?.slice(0, 100)}${a.body?.length > 100 ? "…" : ""}</p>
        <p>Lejár: ${new Date(a.expires_at).toLocaleDateString("hu-HU")}</p>
      </div>
      <button class="ann-delete" onclick="deleteAnn(${a.id}, this)">Törlés</button>
    `;
    list.appendChild(div);
  });
}

async function deleteAnn(id, btn) {
  btn.disabled = true;
  await fetch(`/api/announcements/${id}`, { method: "DELETE" });
  loadAnnouncements();
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("annForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const title = document.getElementById("annTitle").value.trim();
    const body = document.getElementById("annBody").value.trim();
    const image_url = document.getElementById("annImage").value.trim();
    const days = document.getElementById("annDays").value;

    const res = await fetch("/api/announcements", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, body, image_url, days })
    });

    if (res.ok) {
      e.target.reset();
      loadAnnouncements();
    }
  });
});
</script>

<div class="admin-tabs">
  <button class="tab-btn active" data-tab="tab-users">👤 Felhasználók</button>
  <button class="tab-btn" data-tab="tab-announcements">📢 Üzenőfal kiírások</button>
</div>

<div id="tab-users" class="tab-panel active">
  <table class="users-table">
    <thead>
      <tr>
        <th>ID</th><th>Felhasználónév</th><th>Email</th>
        <th>Role</th><th>Patreon</th><th>Tier</th><th>Létrehozva</th>
      </tr>
    </thead>
    <tbody id="usersTableBody"></tbody>
  </table>
</div>

<div id="tab-announcements" class="tab-panel">
  <form class="ann-form" id="annForm">
    <input id="annTitle" type="text" placeholder="Cím *" required>
    <textarea id="annBody" placeholder="Szöveg *" required></textarea>
    <input id="annImage" type="url" placeholder="Kép URL (opcionális)">
    <input id="annDays" type="number" min="1" max="365" placeholder="Megjelenés (napok száma) *" required>
    <button type="submit">➕ Kiírás hozzáadása</button>
  </form>
  <div class="ann-list" id="annList"></div>
</div>

<div id="footer"></div>
<script src="/js/footer.js"></script>
<script type="module" src="/js/layout-loader.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/auth-check.js"></script>
</body>
</html>
