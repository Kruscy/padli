<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>PadlizsanFanSub - Settings</title>
<link rel="stylesheet" href="/css/sidebar.css">
<link rel="stylesheet" href="/css/search.css">
<link rel="stylesheet" href="/css/grid.css">
<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/settings.css">
<link rel="stylesheet" href="/css/footer.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

</head>
<body>
<div id="header-root"></div>
<div id="sidebar-root"></div>

  <div class="settings-layout">
    <!-- BAL OLDALI MENÜ -->
    <aside class="settings-nav">
      <h3>Account</h3>
      <button data-tab="account" class="active">👤 Fiók</button>
      <button data-tab="patreon">💜 Patreon</button>
      <button data-tab="anilist">📚 AniList</button>
    </aside>

    <!-- JOBB OLDALI TARTALOM -->
    <main class="settings-content">
      <section id="tab-account" class="tab active">
    <h1>⚙️ Fiók</h1>

    <form id="settingsForm">

      <div class="field">
        <label>Felhasználónév</label>
        <input id="username" disabled>
      </div>

      <div class="field">
        <label>Email</label>
        <input id="email" type="email">
      </div>

      <hr>

      <div class="field">
        <label>Régi jelszó</label>
        <input id="oldPassword" type="password">
      </div>

      <div class="field">
        <label>Új jelszó</label>
        <input id="newPassword" type="password">
      </div>

      <div class="field">
        <label>Új jelszó újra</label>
        <input id="newPassword2" type="password">
      </div>

      <button class="save-btn">💾 Mentés</button>

      <div id="status" class="status"></div>

    </form>
	</section>

<section id="tab-patreon" class="tab">
  <h2>💜 Patreon</h2>

  <!-- NINCS ÖSSZEKÖTVE -->
  <div id="patreon-disconnected" class="patreon-box hidden">
    <p>
      Kösd össze a Patreon fiókodat, hogy megkapd az extra tartalmakat.
    </p>

    <button id="patreonConnectBtn" class="patreon-btn">
      💜 Patreon összekapcsolása
    </button>
  </div>

  <!-- ÖSSZEKÖTVE -->
  <div id="patreon-connected" class="patreon-box hidden">
    <p><b>Állapot:</b> <span id="patreonActive"></span></p>
    <p><b>Tier:</b> <span id="patreonTier"></span></p>

    <button id="patreonDisconnectBtn" class="disconnect-btn">
      Leválasztás
    </button>
  </div>
</section>

<section id="tab-anilist" class="tab">
  <h2>📚 AniList</h2>

  <div id="anilist-disconnected">
    <p>Kösd össze az AniList fiókodat a szinkronhoz.</p>
    <button id="anilistConnectBtn" class="anilist-btn">
      Összekapcsolás
    </button>
  </div>

  <div id="anilist-connected" class="hidden">
    <p class="connected-text">✔ Összekapcsolva</p>
    <button id="anilistDisconnectBtn" class="disconnect-btn">
      Leválasztás
    </button>
  </div>
</section>

    </main>

  <script src="/js/settings.js"></script>
</div>
<div id="footer"></div>
<script src="/js/footer.js"></script>
<script src="/js/anilist-settings.js"></script>
<script src="/js/patreon-settings.js"></script>
<script type="module" src="/js/layout-loader.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/auth-check.js"></script>

</body>
</html>
