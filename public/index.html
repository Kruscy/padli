<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>PadlizsanFanSub</title>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favico.png">
<link rel="stylesheet" href="/css/sidebar.css">
<link rel="stylesheet" href="/css/search.css">
<link rel="stylesheet" href="/css/grid.css">
<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/footer.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

</head>
<body>
<div id="header-root"></div>
<div id="sidebar-root"></div>

<section class="hero">

  <button id="heroPrev" class="hero-arrow left">‹</button>

  <div id="heroContent" class="hero-content fade">
    <div class="hero-inner"></div>
  </div>

  <button id="heroNext" class="hero-arrow right">›</button>

  <div id="heroDots" class="hero-dots"></div>

</section>

<main class="content">
<h2>📖 Most olvasott</h2>
<div id="grid" class="grid"></div>

<script>
(async function () {
  try {
    const mangas = await (await fetch("/api/manga")).json();
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const items = await Promise.all(
      mangas.map(async (m) => {
        const [progressRes, chaptersRes] = await Promise.all([
          fetch(`/api/progress/${m.slug}`),
          fetch(`/api/chapters/${m.slug}`)
        ]);

        if (!progressRes.ok || !chaptersRes.ok) return null;

        const progress = await progressRes.json();
        if (!progress) return null;

const chaptersData = await chaptersRes.json();
const chapters = chaptersData.chapters || chaptersData;
if (!chapters.length) return null;

const lastChapter = chapters[chapters.length - 1].folder;
        // ❌ ha elérte az utolsó részt → ne jelenjen meg
        if (progress.chapter === lastChapter) return null;

        return { manga: m, progress };
      })
    );

const filtered = items
  .filter(Boolean)
  .sort((a, b) => {
    // legutóbb olvasott elöl
    return new Date(b.progress.updated_at) - new Date(a.progress.updated_at);
  });

    if (!filtered.length) {
      grid.innerHTML = "<p>Nincs aktív olvasásod.</p>";
      return;
    }

    filtered.forEach(({ manga, progress }) => {
      const card = document.createElement("div");
      card.className = "card";

      /* COVER → FOLYTATÁS */
      const coverLink = document.createElement("a");
      coverLink.className = "cover";
      coverLink.href =
        `/reader.html?slug=${encodeURIComponent(manga.slug)}&chapter=${encodeURIComponent(progress.chapter)}&page=${progress.page}`;

      if (manga.cover_url) {
        const img = document.createElement("img");
        img.src = manga.cover_url;
        img.loading = "lazy";
        coverLink.appendChild(img);
      }

      const badge = document.createElement("div");
      badge.className = "continue-badge";
      badge.textContent = "▶ Folytatás";
      coverLink.appendChild(badge);

      /* TITLE → CHAPTERS */
      const title = document.createElement("a");
      title.className = "title";
      title.href = `/chapters.html?slug=${encodeURIComponent(manga.slug)}`;
      title.textContent = manga.title;

      card.appendChild(coverLink);
      card.appendChild(title);
      grid.appendChild(card);
    });

  } catch (e) {
    console.error("Most olvasott hiba:", e);
  }
})();
</script>

<h2>🆕 Új részek</h2>
<div id="newGrid" class="content"></div>
<script>
(async function () {
  try {
    const grid = document.getElementById("newGrid");

    const res = await fetch("/api/new-releases");
    const items = await res.json();

    grid.innerHTML = "";

    for (const item of items) {
      const card = document.createElement("div");
      card.className = "card";

      const coverLink = document.createElement("a");
      coverLink.className = "cover";
      coverLink.href = `/chapters.html?slug=${encodeURIComponent(item.slug)}`;

      if (item.cover_url) {
        const img = document.createElement("img");
        img.src = item.cover_url;
        img.loading = "lazy";
        coverLink.appendChild(img);
      }

      const badge = document.createElement("div");
      badge.className = "new-count";
      badge.textContent = `Új részek: +${item.new_count}`;
      coverLink.appendChild(badge);

      const title = document.createElement("a");
      title.className = "title";
      title.href = coverLink.href;
      title.textContent = item.title;

      card.appendChild(coverLink);
      card.appendChild(title);
      grid.appendChild(card);
    }
  } catch (e) {
    console.error("Új részek hiba:", e);
  }
})();
</script>
</main>

<script src="/js/hero.js"></script>
<script type="module" src="/js/layout-loader.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/auth-check.js"></script>
<div id="footer"></div>
<script src="/js/footer.js"></script>
<script>
  var _paq = window._paq = window._paq || [];
  /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  (function() {
    var u="//mamato.csimota.duckdns.org/";
    _paq.push(['setTrackerUrl', u+'matomo.php']);
    _paq.push(['setSiteId', '1']);
    var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
    g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
  })();
</script>
</body>
</html>
