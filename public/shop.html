<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kredit vásárlás – PadlizsanFanSub</title>
  <link rel="icon" type="image/png" href="/assets/favico.png">
  <link rel="stylesheet" href="/css/header.css?v=20260619">
  <link rel="stylesheet" href="/css/sidebar.css?v=20260119">
  <link rel="stylesheet" href="/css/footer.css?v=20260405">
  <link rel="stylesheet" href="/css/shop.css?v=20260619">
  <link rel="stylesheet" href="/css/main.css?v=20260619">
</head>
<body>

<div id="header-root"></div>
<div id="sidebar-root"></div>

<main>
<div class="shop-wrap">

  <!-- FEJLÉC -->
  <div class="shop-header">
    <h1 class="shop-title">🔮 Fordítási kreditek</h1>
    <p class="shop-subtitle">Vásárolj krediteket a manga fordításhoz. 1 kredit = 1 kép fordítása.</p>
    <div class="shop-balance" id="shopBalance">
      Egyenleged: <strong id="shopPoints">...</strong> kredit
    </div>
  </div>

  <!-- SUCCESS / CANCEL ÜZENET -->
  <div id="shopMsg" style="display:none"></div>

  <!-- CSOMAGOK -->
  <div class="shop-grid" id="shopGrid">
    <div class="shop-loading">Betöltés...</div>
  </div>

  <!-- RENDELÉSI ELŐZMÉNYEK -->
  <div class="shop-orders" id="shopOrders" style="display:none">
    <h2 class="shop-orders-title">📋 Vásárlási előzmények</h2>
    <div id="shopOrdersList"></div>
  </div>

</div>
</main>

<div id="footer"></div>
<script src="/js/footer.js?v=20260619"></script>
<script type="module" src="/js/layout-loader.js?v=20260619"></script>
<script src="/js/sidebar.js?v=20260204"></script>
<script src="/js/auth-check.js?v=20260323"></script>

<script src="/js/shop-init.js?v=20260619"></script>

</body>
</html>
