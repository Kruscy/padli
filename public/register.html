<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <title>Register – PadlizsanFanSub</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favico.png">
  <link rel="stylesheet" href="/css/auth.css?v=20260404" />
  <link rel="stylesheet" href="/css/footer.css?v=20260405">
</head>
<body>

<div class="auth-page" id="authPage">
  <div class="auth-card">
    <h1>PadlizsanFanSub</h1>

    <form id="registerForm">
      <input id="username" placeholder="Felhasználónév" />
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Jelszó" />
      <input id="password2" type="password" placeholder="Jelszó újra" />

      <div class="gdpr-wrap">
        <label class="gdpr-label">
          <input type="checkbox" id="gdprAccept" />
          <span>Elfogadom az <a href="/privacy.html" target="_blank">Adatvédelmi Nyilatkozatot</a> (GDPR)</span>
        </label>
      </div>

      <button>Regisztráció</button>
    </form>

    <div id="error" class="error"></div>

    <p>Már van fiókod? <a href="/login.html">Login</a></p>
  </div>
</div>

<div id="footer"></div>
<script src="/js/footer.js?v=20260619"></script>
<script src="/js/register.js?v=20260619"></script>
</body>
</html>
