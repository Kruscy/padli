<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PadlizsanFanSub – Manga</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favico.png">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <link rel="stylesheet" href="/css/search.css">
  <link rel="stylesheet" href="/css/locked.css">
  <link rel="stylesheet" href="/css/chapters.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/manga-edit.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    .manga-info-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.75rem; margin-bottom: 0.5rem; }
    .manga-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
    .badge-status { background: #1e293b; color: #94a3b8; }
    .badge-status.releasing { background: #14532d; color: #86efac; }
    .badge-status.finished  { background: #1e3a5f; color: #7dd3fc; }
    .badge-status.hiatus    { background: #451a03; color: #fcd34d; }
    .badge-status.cancelled { background: #3f1d1d; color: #fca5a5; }
    .badge-score { background: #2d1b69; color: #c4b5fd; }
    .badge-chapters { background: #1a2e1a; color: #86efac; }
    .chapters-tabs { display: flex; border-bottom: 2px solid #2a2a3e; margin-top: 2rem; margin-bottom: 1rem; }
    .chapters-tab-btn { background: none; border: none; color: #aaa; font-size: 0.95rem; font-weight: 600; padding: 10px 20px; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; font-family: Poppins, sans-serif; transition: color 0.15s; }
    .chapters-tab-btn.active { color: #fff; border-bottom-color: #7c3aed; }
    .chapters-tab-panel { display: none; }
    .chapters-tab-panel.active { display: block; }
    .manga-genres { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 0.5rem; }
    .genre-tag { padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; background: #1e293b; color: #7dd3fc; cursor: pointer; transition: background 0.15s; }
    .genre-tag:hover { background: #2a3f5f; }
    .tag-item { padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; background: #1a1a2e; color: #a78bfa; cursor: pointer; transition: background 0.15s; }
    .tag-item:hover { background: #2a1a4e; }
    .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; padding: 1rem 0; }
    .rec-card { text-decoration: none; color: #fff; border-radius: 10px; overflow: hidden; background: #161b22; transition: transform 0.15s; }
    .rec-card:hover { transform: translateY(-4px); }
    .rec-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
    .rec-card-title { padding: 8px; font-size: 0.8rem; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .rec-card-no-link { opacity: 0.5; cursor: default; }
    .rec-card-no-link:hover { transform: none; }
    .rec-empty { color: #aaa; padding: 2rem 0; font-size: 0.9rem; }
    .delete-progress-btn { background: #3f1d1d; color: #fca5a5; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: background 0.15s; }
    .delete-progress-btn:hover { background: #7f1d1d; }
    .rating-widget { display: flex; align-items: center; gap: 12px; margin: 0.75rem 0; flex-wrap: wrap; }
    .eggplant-row { display: flex; gap: 4px; cursor: pointer; }
    .eggplant { font-size: 1.6rem; filter: grayscale(1) brightness(0.5); transition: filter 0.15s, transform 0.15s; user-select: none; }
    .eggplant.active { filter: grayscale(0) brightness(1); transform: scale(1.15); }
    .eggplant.hover { filter: grayscale(0) brightness(1.2); transform: scale(1.2); }
    .rating-label { font-size: 0.85rem; color: #aaa; min-width: 80px; }
    .badge-rating { background: #2d1b69 !important; color: #c4b5fd !important; cursor: pointer; transition: background 0.15s; }
    .badge-rating:hover { background: #3d2b89 !important; }
  </style>
</head>
<body>
<div id="header-root"></div>
<div id="sidebar-root"></div>

<main class="content">
  <div class="manga-header">
    <img id="coverImg" class="manga-cover" src="/assets/no-cover.png">
    <div class="manga-meta">
      <h1 id="mangaTitle">Loading...</h1>
      <div class="manga-info-bar" id="mangaInfoBar"></div>
      <div id="ratingWidget" class="rating-widget"></div>
      <div class="action-bar">
        <a id="continueBtn" class="btn primary hidden">▶ Folytatás</a>
        <button id="wantBtn" class="btn">Fel a polcra</button>
        <button id="favBtn" class="btn">❤️ Kedvenc</button>
        <button id="deleteProgressBtn" class="delete-progress-btn hidden">🗑️ Könyvjelző törlése</button>
        <div id="editWrapper" class="edit-wrapper hidden">
          <button id="editBtn" class="edit-btn" title="Szerkesztés" type="button">✏️</button>
        </div>
      </div>
      <p id="description" class="description"></p>
      <div id="genres" class="manga-genres"></div>
      <div id="tags" class="manga-genres" style="margin-top:6px;"></div>
    </div>
  </div>

  <div class="chapters-tabs">
    <button class="chapters-tab-btn active" data-tab="tab-chapters">📖 Részek</button>
    <button class="chapters-tab-btn" data-tab="tab-recommendations">✨ Hasonló művek</button>
  </div>
  <div id="tab-chapters" class="chapters-tab-panel active">
    <div id="chapters" class="chapter-list"></div>
  </div>
  <div id="tab-recommendations" class="chapters-tab-panel">
    <div id="recGrid" class="rec-grid"></div>
  </div>
</main>

<!-- LOCKED MODAL -->
<div id="lockedModal" class="locked-modal hidden">
  <div id="lockedBackdrop" class="locked-backdrop"></div>
  <div class="locked-box">
    <div id="lockPaywallContent"><!-- JS tölti be --></div>
    <button id="lockCloseBtn" class="lock-close">✕ Bezárás</button>
  </div>
</div>

<script src="/js/chapters-init.js"></script>

<script src="/js/chapters-manga-init.js"></script>

<script src="/js/chapters-want-init.js"></script>

<script src="/js/chapters-admin-init.js"></script>

<script src="/js/chapters-rating-init.js"></script>

<script src="/js/chapters-locked-modal-init.js"></script>

<script type="module" src="/js/paywall.js"></script>
<script type="module" src="/js/layout-loader.js"></script>
<script src="/js/purify.min.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/auth-check.js"></script>
<script src="/js/manga-edit.js"></script>
<div id="footer"></div>
<script src="/js/footer.js"></script>
<script src="/js/matomo.js"></script>
</body>
</html>
