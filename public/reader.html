<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PadlizsanFanSub – Reader</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favico.png">
  <link rel="stylesheet" href="/css/reader.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a id="backBtn" href="#">⬅ Vissza</a>
  <div id="mangaTitle"></div>
  <div id="chapterNum"></div>
</div>

<!-- KÖNYV MÓD NYILAK -->
<button class="book-arrow left"  id="bookPrev" aria-label="Előző oldal">‹</button>
<button class="book-arrow right" id="bookNext" aria-label="Következő oldal">›</button>

<!-- OLDALAK -->
<div id="pages"></div>

<!-- BOTTOMBAR -->
<div class="bottombar">
  <button id="prevBtn">← Előző</button>

  <div class="bottombar-center">
    <!-- Teljes képernyő -->
    <button class="btn-icon" id="btnFullscreen" title="Teljes képernyő" onclick="toggleFullscreen()">⤢</button>

    <!-- Olvasási mód váltó -->
    <button class="btn-icon btn-mode" data-mode="scroll" title="Folyamatos görgetés" onclick="cycleMode()">📜</button>
    <button class="btn-icon btn-mode" data-mode="book"   title="Könyv mód (bal/jobb oldal)" style="display:none">📖</button>
  </div>

  <button id="nextBtn">Következő →</button>
</div>

<!-- Könyv mód nyilak kattintáskezelő -->
<script>
  document.getElementById("bookPrev")?.addEventListener("click", () => bookPrev());
  document.getElementById("bookNext")?.addEventListener("click", () => bookNext());
</script>

<script src="/js/reader.js"></script>
<script type="module" src="/js/layout-loader.js"></script>
</body>
</html>
