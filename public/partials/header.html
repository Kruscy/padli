<header class="topbar">

  <!-- BAL: hamburger + logo -->
  <div class="topbar-left">
    <button id="menuToggle" class="menu-btn">☰</button>
    <a href="/" class="logo">
      <img src="/assets/logo.png" alt="PadlizsanFanSub">
      <span>PadlizsanFanSub</span>
    </a>
  </div>

  <!-- KÖZÉP: kereső -->
  <div class="search-wrapper" id="searchWrapper">
    <button class="search-toggle-btn" id="searchToggleBtn" title="Keresés">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <input type="text" id="searchInput" placeholder="Manga keresése..." autocomplete="off" />
    <div id="searchResults" class="search-results hidden"></div>
  </div>

  <!-- JOBB: közösség + harang + avatar -->
  <div class="topbar-right">

    <!-- Patreon (asztali, ha van hely) -->
    <a href="https://patreon.com/Padlizsanfansub" target="_blank" rel="noopener" class="topbar-community-btn topbar-patreon">
      <img src="/assets/pat2.png" alt="Patreon">
      <span>Patreon</span>
    </a>

    <!-- Discord (asztali, ha van hely) -->
    <a href="https://discord.gg/Hq6SysgZXC" target="_blank" rel="noopener" class="topbar-community-btn topbar-discord">
      <img src="/assets/discord.svg" alt="Discord">
      <span>Discord</span>
    </a>

    <!-- Értesítési badge -->
    <div id="notificationBadge" class="notification-badge-wrapper">
      <button class="icon-btn notification-btn" title="Értesítések">
        🔔
        <span id="notificationCount" class="notification-count hidden">0</span>
      </button>
      <div id="notificationDropdown" class="notification-dropdown hidden">
        <div class="notification-header">
          <span class="notification-title">Értesítések</span>
          <div class="notification-header-actions">
            <button id="markAllReadBtn" class="mark-all-read-btn">Mind olvasva</button>
            <button id="deleteAllNotifBtn" class="delete-all-notif-btn">Összes törlés</button>
          </div>
        </div>
        <div id="notificationList" class="notification-list">
          <div class="notification-loading">Betöltés...</div>
        </div>
      </div>
    </div>

    <!-- Profil / beállítások -->
    <div class="settings-wrapper">
      <button id="settingsBtn" class="icon-btn settings-btn" title="Beállítások">
        <img id="headerAvatar" src="/uploads/default.png" class="header-avatar">
      </button>

      <div id="settingsMenu" class="settings-menu hidden">
        <div class="settings-user">
          <div>
            <div id="menuUserName">Felhasználó</div>
            <div class="user-tier" id="menuUserTier"></div>
          </div>
        </div>

        <div class="settings-menu-item online-item">
          🟢 Online: <span id="onlineCount">...</span>
        </div>

        <a href="/profile.html">👤 My Profile</a>
        <a href="/settings.html">⚙️ Beállitások</a>
        <a href="/stats.html">📊 Statisztika</a>

        <button id="logoutBtn" class="settings-action logout-item">
          <img src="/assets/logout.png" class="menu-icon">
          <span>Kijelentkezés</span>
        </button>

        <!-- ADMIN ONLY -->
        <button id="usersBtn" type="button" class="settings-action hidden">🛠️ Admin</button>
        <!-- UPLOADER -->
        <button id="uploaderBtn" type="button" class="settings-action hidden">📤 Feltöltő</button>
        <button id="scanBtn" class="settings-action hidden" type="button">🔄 Scan library</button>

        <!-- Közösség (dropdown-ban is marad mobilra) -->
        <div class="settings-divider"></div>
        <a href="https://patreon.com/Padlizsanfansub" target="_blank" rel="noopener" class="settings-community-item">
          <img src="/assets/pat2.png" alt="Patreon" class="community-icon">
          <span>Patreon támogatás</span>
        </a>
        <a href="https://discord.gg/Hq6SysgZXC" target="_blank" rel="noopener" class="settings-community-item">
          <img src="/assets/discord.svg" alt="Discord" class="community-icon">
          <span>Discord szerver</span>
        </a>
      </div>
    </div>

  </div>
</header>
